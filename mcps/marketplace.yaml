        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": ["jupyter-mcp-server==1.0.2"],
            "env": {
              "JUPYTER_URL": "{{JUPYTER_URL}}",
              "JUPYTER_TOKEN": "{{JUPYTER_TOKEN}}",
              "ALLOW_IMG_OUTPUT": "true"
            }
          }
    parameters:
      - name: Jupyter server URL
        key: JUPYTER_URL
        placeholder: http://localhost:8888
      - name: Jupyter server token
        key: JUPYTER_TOKEN
        placeholder: your_jupyter_token
  - id: laravel-boost
    name: Laravel Boost
    description: Official Laravel MCP server providing comprehensive AI-powered development tools including database schema
      inspection, query execution, route analysis, artisan command access, configuration management, documentation
      search, error tracking, and extensible skills system for Laravel applications.
    author: laravel
    url: https://github.com/laravel/boost
    category: development
    tags:
      - development
    prerequisites:
      - PHP 8.1 or higher
      - Laravel 10.x, 11.x, or 12.x
      - Composer
      - Laravel Boost package installed via composer require laravel/boost --dev
    content:
      - name: PHP Artisan
        prerequisites:
          - PHP 8.1+
          - Laravel 10.x/11.x/12.x
          - Laravel Boost package installed
        content: |
          {
            "command": "php",
            "args": ["artisan", "boost:mcp"]
          }
    parameters: []
  - id: looker-toolbox
    name: Looker MCP Toolbox
    description: Runs Google's local MCP Toolbox prebuilt for Looker, providing query, content, and LookML context with
      Looker API client credentials.
    author: Google Cloud
    url: https://github.com/googleapis/mcp-toolbox
    category: data
    tags:
      - data
    prerequisites:
      - Node.js
      - Looker API credentials restricted to the intended models and content
    content:
      - name: NPX (official prebuilt)
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@toolbox-sdk/server@1.5.0", "--prebuilt", "looker", "--stdio"],
