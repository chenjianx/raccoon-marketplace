  - id: atlassian
    name: Atlassian
    description: Comprehensive MCP server for Atlassian tools (Confluence and Jira) supporting both Cloud and Server/Data
      Center deployments with multiple authentication methods including API tokens, Personal Access Tokens, and OAuth
      2.0.
    author: sooperset
    url: https://github.com/sooperset/mcp-atlassian
    category: productivity
    tags:
      - productivity
    prerequisites:
      - Docker
      - Atlassian account (Cloud or Server/Data Center)
    content:
      - name: Docker
        prerequisites:
          - Docker
          - Atlassian Cloud account
        content: >
          {
            "command": "docker",
            "args": ["run", "-i", "--rm", "-e", "CONFLUENCE_URL", "-e", "CONFLUENCE_USERNAME", "-e", "CONFLUENCE_API_TOKEN", "-e", "JIRA_URL", "-e", "JIRA_USERNAME", "-e", "JIRA_API_TOKEN", "ghcr.io/sooperset/mcp-atlassian@sha256:27c8e5b890e16134a443f49683eaa794fdb48ed5bef785c1b4c88a0cd729df56"],
            "env": {
              "CONFLUENCE_URL": "{{CONFLUENCE_URL}}",
              "CONFLUENCE_USERNAME": "{{CONFLUENCE_USERNAME}}",
              "CONFLUENCE_API_TOKEN": "{{CONFLUENCE_API_TOKEN}}",
              "JIRA_URL": "{{JIRA_URL}}",
              "JIRA_USERNAME": "{{JIRA_USERNAME}}",
              "JIRA_API_TOKEN": "{{JIRA_API_TOKEN}}"
            }
          }
        parameters:
          - name: Confluence URL
            key: CONFLUENCE_URL
            placeholder: https://your-company.atlassian.net/wiki
          - name: Confluence Username
            key: CONFLUENCE_USERNAME
            placeholder: your.email@company.com
          - name: Confluence API Token
            key: CONFLUENCE_API_TOKEN
            placeholder: your_confluence_api_token
          - name: Jira URL
            key: JIRA_URL
            placeholder: https://your-company.atlassian.net
          - name: Jira Username
            key: JIRA_USERNAME
            placeholder: your.email@company.com
          - name: Jira API Token
            key: JIRA_API_TOKEN
            placeholder: your_jira_api_token
      - name: UVX
        prerequisites:
          - Python and uv
        content: >
          {
            "command": "uvx",
            "args": ["--from", "mcp-atlassian==0.11.9", "--hash", "sha256:1ba6a171b5299e554d4e0eff98279e74cdc4eb1c12c8e62be924103d9cd38e5e", "mcp-atlassian"],
            "env": {
              "CONFLUENCE_URL": "{{CONFLUENCE_URL}}",
              "CONFLUENCE_USERNAME": "{{CONFLUENCE_USERNAME}}",
              "CONFLUENCE_API_TOKEN": "{{CONFLUENCE_API_TOKEN}}",
              "JIRA_URL": "{{JIRA_URL}}",
              "JIRA_USERNAME": "{{JIRA_USERNAME}}",
              "JIRA_API_TOKEN": "{{JIRA_API_TOKEN}}"
            }
          }
        parameters:
          - name: Confluence URL
            key: CONFLUENCE_URL
            placeholder: https://your-company.atlassian.net/wiki
          - name: Confluence Username
            key: CONFLUENCE_USERNAME
            placeholder: your.email@company.com
          - name: Confluence API Token
            key: CONFLUENCE_API_TOKEN
            placeholder: your_confluence_api_token
          - name: Jira URL
            key: JIRA_URL
            placeholder: https://your-company.atlassian.net
          - name: Jira Username
            key: JIRA_USERNAME
            placeholder: your.email@company.com
          - name: Jira API Token
            key: JIRA_API_TOKEN
            placeholder: your_jira_api_token
  - id: aws
    name: AWS Managed MCP Server
    description: Connects to AWS's managed MCP service through the official SigV4 proxy, using local AWS credentials and an
      explicitly selected operation region.
    author: Amazon Web Services
    url: https://github.com/aws/mcp-proxy-for-aws
    category: development
    tags:
      - development
    prerequisites:
      - Python and uv
      - AWS CLI 2.32.0+ with authenticated credentials
    content:
      - name: UVX SigV4 proxy (official)
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": [
              "mcp-proxy-for-aws==1.6.2",
              "https://aws-mcp.us-east-1.api.aws/mcp",
              "--metadata",
              "AWS_REGION={{AWS_REGION}}"
            ],
            "env": {
              "AWS_PROFILE": "{{AWS_PROFILE}}"
            }
          }
    parameters:
      - name: AWS profile
        key: AWS_PROFILE
        placeholder: default
      - name: AWS operation region
        key: AWS_REGION
        placeholder: us-east-1
  - id: aws-api-mcp
    name: AWS API MCP
    description: Executes validated AWS CLI read operations across AWS services, with local file access disabled and
      authentication inherited from a named AWS profile.
    author: AWS Labs
    url: https://github.com/awslabs/mcp/tree/main/src/aws-api-mcp-server
    category: development
    tags:
      - development
    prerequisites:
      - Python and uv
      - AWS credentials restricted by IAM to the intended account and resources
    content:
      - name: UVX (official, read-only)
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": ["awslabs.aws-api-mcp-server==1.3.45"],
            "env": {
              "AWS_API_MCP_PROFILE_NAME": "{{AWS_PROFILE}}",
              "AWS_REGION": "{{AWS_REGION}}",
              "READ_OPERATIONS_ONLY": "true",
              "AWS_API_MCP_ALLOW_UNRESTRICTED_LOCAL_FILE_ACCESS": "no-access",
              "AWS_API_MCP_TELEMETRY": "false"
            }
          }
    parameters:
      - name: AWS profile
        key: AWS_PROFILE
        placeholder: default
      - name: AWS region
        key: AWS_REGION
        placeholder: us-east-1
