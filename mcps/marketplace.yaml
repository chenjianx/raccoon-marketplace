      - name: NPX (Docs only)
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "n8n-mcp@2.12.2"],
            "env": {
              "MCP_MODE": "stdio",
              "LOG_LEVEL": "error",
              "DISABLE_CONSOLE_OUTPUT": "true"
            }
