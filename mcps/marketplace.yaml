              "run",
              "-i",
              "--rm",
              "-e",
              "HCP_PROJECT_ID",
              "-e",
              "HCP_CLIENT_ID",
              "-e",
              "HCP_CLIENT_SECRET",
              "hashicorp/vault-radar-mcp-server@sha256:7ca74c677531ee70a6eefc32526def46701518576e7f036466d9a46d3141aac0"
