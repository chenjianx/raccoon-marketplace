      - name: Node.js
        prerequisites:
          - Node.js
        content: |
          {
            "command": "node",
            "args": ["{{LINEAR_PATH}}/build/index.js"],
            "env": {
              "LINEAR_API_KEY": "{{LINEAR_API_KEY}}"
            }
          }
      - name: NPM Development
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npm",
