    url: https://github.com/modelcontextprotocol/servers/tree/main/src/time
    category: productivity
    tags:
      - productivity
    content:
      - name: UVX
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": ["mcp-server-time"]
          }
      - name: Python/Pip
        prerequisites:
          - Python
        content: |
          {
            "command": "python",
            "args": ["-m", "mcp_server_time"]
          }
      - name: Docker
        prerequisites:
          - Docker
        content: |
          {
            "command": "docker",
            "args": ["run", "-i", "--rm", "mcp/time"]
          }
      - name: UVX with Custom Timezone
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": ["mcp-server-time", "--local-timezone={{LOCAL_TIMEZONE}}"]
          }
        parameters:
          - name: Local Timezone
            key: LOCAL_TIMEZONE
            placeholder: America/New_York
      - name: Python/Pip with Custom Timezone
        prerequisites:
          - Python
        content: |
          {
            "command": "python",
            "args": ["-m", "mcp_server_time", "--local-timezone={{LOCAL_TIMEZONE}}"]
          }
        parameters:
          - name: Local Timezone
            key: LOCAL_TIMEZONE
            placeholder: America/New_York
  - id: unity-catalog-functions
    name: Databricks Unity Catalog Functions MCP
    description: Exposes governed Unity Catalog functions in a Databricks catalog and schema as callable tools through the
      workspace-managed MCP endpoint, using a PAT and the caller's EXECUTE permissions.
    author: Databricks
    url: https://docs.databricks.com/aws/en/generative-ai/mcp/managed-mcp
    category: data
    tags:
      - data
    prerequisites:
      - Databricks workspace with managed MCP enabled
      - Token with Unity Catalog function EXECUTE permissions
    content:
      - name: Databricks Managed Remote
        content: >
          {
            "type": "streamable-http",
            "url": "https://{{DATABRICKS_WORKSPACE_HOST}}/api/2.0/mcp/functions/{{DATABRICKS_CATALOG}}/{{DATABRICKS_SCHEMA}}",
            "headers": {
              "Authorization": "Bearer {{DATABRICKS_TOKEN}}"
            }
          }
    parameters:
      - name: Databricks Workspace Host
        key: DATABRICKS_WORKSPACE_HOST
        placeholder: dbc-xxxxxxxx-xxxx.cloud.databricks.com
      - name: Unity Catalog Catalog
        key: DATABRICKS_CATALOG
        placeholder: main
      - name: Unity Catalog Schema
        key: DATABRICKS_SCHEMA
        placeholder: tools
      - name: Databricks Personal Access Token
        key: DATABRICKS_TOKEN
        placeholder: your_databricks_pat
  - id: vault-mcp
    name: HashiCorp Vault MCP Server
    description: Reads Vault metadata and approved secret paths using a dedicated token whose Vault policies deny creates,
      updates, deletes, and administrative operations.
    author: HashiCorp
    url: https://github.com/hashicorp/vault-mcp-server
    category: development
    tags:
      - development
    prerequisites:
      - Docker
      - Dedicated HashiCorp Vault token with backend-enforced read-only policies for explicitly approved paths
    content:
      - name: Docker image 0.2.0
        prerequisites:
          - Docker
        content: |
          {
            "command": "docker",
            "args": [
              "run",
              "-i",
              "--rm",
              "-e",
              "VAULT_ADDR",
              "-e",
              "VAULT_TOKEN",
              "-e",
              "VAULT_NAMESPACE",
              "hashicorp/vault-mcp-server@sha256:e4e8df2fb7d27f12c5cb8d1c5b37663a9569ad5ce0047fa0281c56a1769222aa"
            ],
            "env": {
              "VAULT_ADDR": "{{VAULT_ADDR}}",
              "VAULT_TOKEN": "{{VAULT_TOKEN}}",
              "VAULT_NAMESPACE": "{{VAULT_NAMESPACE}}"
            }
          }
    parameters:
      - name: Vault Address
        key: VAULT_ADDR
        placeholder: https://vault.example.com:8200
      - name: Vault Token
        key: VAULT_TOKEN
        placeholder: your_least_privilege_vault_token
      - name: Vault Namespace
        key: VAULT_NAMESPACE
        placeholder: your_namespace
        optional: true
  - id: vault-radar-mcp
    name: HCP Vault Radar MCP Server
    description: Retrieves Vault Radar data sources, resources, detected-secret events, and secret types from an HCP project
      using a service principal scoped to that project.
