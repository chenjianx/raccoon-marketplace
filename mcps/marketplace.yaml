        content: |
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-puppeteer"]
          }
      - name: Docker
        prerequisites:
          - Docker
        content: |
          {
            "command": "docker",
            "args": ["run", "-i", "--rm", "--init", "-e", "DOCKER_CONTAINER=true", "mcp/puppeteer"]
          }
  - id: redis
    name: Redis
    description: Provides access to Redis key-value stores, enabling operations like setting, getting, deleting, and listing
      keys with optional expiration time support.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers/tree/main/src/redis
    category: data
    tags:
      - data
    content:
      - name: UVX
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": ["mcp-server-redis", "--url", "{{REDIS_URL}}"]
          }
      - name: Python/Pip
        prerequisites:
          - Python
        content: |
          {
            "command": "python",
            "args": ["-m", "mcp_server_redis", "--url", "{{REDIS_URL}}"]
          }
      - name: Docker
        prerequisites:
          - Docker
        content: |
          {
            "command": "docker",
            "args": ["run", "-i", "--rm", "mcp/redis", "--url", "{{REDIS_URL}}"]
          }
      - name: UVX with Authentication
        prerequisites:
          - Python
          - uv
        content: >
          {
            "command": "uvx",
            "args": ["mcp-server-redis", "--url", "{{REDIS_URL}}", "--username", "{{REDIS_USERNAME}}", "--password", "{{REDIS_PASSWORD}}"]
          }
        parameters:
          - name: Redis Username
            key: REDIS_USERNAME
            placeholder: your_redis_username
          - name: Redis Password
            key: REDIS_PASSWORD
            placeholder: your_redis_password
      - name: Python/Pip with Authentication
        prerequisites:
          - Python
        content: >
          {
            "command": "python",
            "args": ["-m", "mcp_server_redis", "--url", "{{REDIS_URL}}", "--username", "{{REDIS_USERNAME}}", "--password", "{{REDIS_PASSWORD}}"]
          }
        parameters:
          - name: Redis Username
            key: REDIS_USERNAME
            placeholder: your_redis_username
          - name: Redis Password
            key: REDIS_PASSWORD
            placeholder: your_redis_password
    parameters:
      - name: Redis URL
        key: REDIS_URL
        placeholder: redis://localhost:6379
  - id: redis-mcp
    name: Redis Data MCP (Official)
    description: Reads, searches, and manages Redis strings, hashes, lists, sets, streams, JSON documents, and vector
      indexes using a Redis ACL user; configure a read-only ACL user for safe analysis.
    author: Redis
    url: https://github.com/redis/mcp-redis
    category: data
    tags:
      - data
    prerequisites:
      - Python and uv
      - Redis deployment and dedicated ACL credentials that deny all write commands
    content:
      - name: UVX
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": [
              "--from",
              "redis-mcp-server==0.5.0",
              "redis-mcp-server"
            ],
            "env": {
              "REDIS_HOST": "{{REDIS_HOST}}",
              "REDIS_PORT": "{{REDIS_PORT}}",
              "REDIS_DB": "{{REDIS_DB}}",
              "REDIS_USERNAME": "{{REDIS_USERNAME}}",
              "REDIS_PWD": "{{REDIS_PASSWORD}}",
              "REDIS_SSL": "{{REDIS_SSL}}"
            }
          }
    parameters:
      - name: Redis Host
        key: REDIS_HOST
        placeholder: localhost
      - name: Redis Port
        key: REDIS_PORT
        placeholder: "6379"
        optional: true
      - name: Redis Database
        key: REDIS_DB
        placeholder: "0"
        optional: true
      - name: Redis ACL Username
        key: REDIS_USERNAME
        placeholder: readonlyuser
      - name: Redis ACL Password
        key: REDIS_PASSWORD
        placeholder: your_redis_password
      - name: Enable Redis TLS
        key: REDIS_SSL
        placeholder: "false"
        optional: true
  - id: sequentialthinking
    name: Sequential Thinking
    description: A structured problem-solving tool that enables step-by-step analysis, thought revision, and branching logic
      for complex reasoning tasks.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers/tree/main/src/sequentialthinking
    category: productivity
    tags:
      - productivity
    content:
      - name: NPX
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-sequential-thinking"]
          }
      - name: Docker
        prerequisites:
          - Docker
        content: |
