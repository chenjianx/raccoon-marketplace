    content:
      - name: UVX
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": [
              "--from",
              "redis-mcp-server==0.5.0",
              "redis-mcp-server"
            ],
            "env": {
              "REDIS_HOST": "{{REDIS_HOST}}",
              "REDIS_PORT": "{{REDIS_PORT}}",
              "REDIS_DB": "{{REDIS_DB}}",
              "REDIS_USERNAME": "{{REDIS_USERNAME}}",
              "REDIS_PWD": "{{REDIS_PASSWORD}}",
              "REDIS_SSL": "{{REDIS_SSL}}"
            }
          }
    parameters:
      - name: Redis Host
        key: REDIS_HOST
        placeholder: localhost
      - name: Redis Port
        key: REDIS_PORT
        placeholder: "6379"
        optional: true
      - name: Redis Database
        key: REDIS_DB
        placeholder: "0"
        optional: true
      - name: Redis ACL Username
        key: REDIS_USERNAME
        placeholder: readonlyuser
      - name: Redis ACL Password
        key: REDIS_PASSWORD
        placeholder: your_redis_password
      - name: Enable Redis TLS
        key: REDIS_SSL
        placeholder: "false"
        optional: true
