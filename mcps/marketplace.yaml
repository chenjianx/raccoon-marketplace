# MCP category usage
#
# 24 MCPs across 4 categories. Each MCP has one primary category.
# This summary is generated by bin/generate-mcps-marketplace.ts; do not edit it manually.
#
# - data: 13
# - development: 7
# - productivity: 2
# - web-automation: 2
#
items:
  - id: codegen
    name: Codegen
    description: Enables parsing codebases and executing codemods through standardized model inference, supporting various
      LLM providers via integration with the Codegen SDK.
    author: codegen-sh
    url: https://github.com/codegen-sh/codegen-sdk/tree/develop/codegen-examples/examples/codegen-mcp-server
    category: development
    tags:
      - development
    prerequisites:
      - uv
      - Python 3.12+
    content:
      - name: UVX
        prerequisites:
          - Python and uv
        content: >
          {
            "command": "uvx",
            "args": [
              "--from",
              "git+https://github.com/codegen-sh/codegen-sdk.git#egg=codegen-mcp-server&subdirectory=codegen-examples/examples/codegen-mcp-server",
              "codegen-mcp-server"
            ]
          }
      - name: Direct Execution
        prerequisites:
          - Python
          - uv
        content: >
          {
            "command": "uvx",
            "args": ["--from", "git+https://github.com/codegen-sh/codegen-sdk.git#egg=codegen-mcp-server&subdirectory=codegen-examples/examples/codegen-mcp-server", "codegen-mcp-server"]
          }
    parameters:
      - name: Prerequisites
        key: PREREQUISITES
        placeholder: Requires uv and Python 3.12+
  - id: dbhub
    name: DBHub
    description: Connects to PostgreSQL, MySQL, MariaDB, SQL Server, or SQLite through Bytebase's token-efficient local MCP
      server using a user-supplied TOML guardrail configuration.
    author: Bytebase
    url: https://github.com/bytebase/dbhub
    category: data
    tags:
      - data
    prerequisites:
      - Node.js
      - DBHub TOML config with execute_sql readonly=true and an appropriate max_rows limit
    content:
      - name: NPX with guarded TOML config
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@bytebase/dbhub@0.22.4", "--transport", "stdio", "--config", "{{DBHUB_CONFIG_PATH}}"]
          }
    parameters:
      - name: DBHub TOML config path
        key: DBHUB_CONFIG_PATH
        placeholder: /absolute/path/to/dbhub.toml
  - id: figma-dev-mode
    name: Figma Dev Mode
    description: Brings Figma directly into your workflow by providing important design information and context to AI agents
      generating code from Figma design files. Enables code generation from selected frames, design context extraction,
      and Code Connect integration.
    author: figma
    url: https://help.figma.com/hc/en-us/articles/32132100833559-Guide-to-the-Dev-Mode-MCP-Server
    category: development
    tags:
      - development
    content:
      - name: Figma Dev Mode
        content: |
          {
            "type": "sse",
            "url": "http://127.0.0.1:3845/sse"
          }
  - id: filesystem
    name: File System
    description: Provides comprehensive filesystem operations including reading, writing, moving files, directory
      management, and advanced file editing with pattern matching and formatting capabilities.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem
    category: development
    tags:
      - development
    content:
      - name: NPX
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-filesystem", "{{ALLOWED_DIRECTORY}}"]
          }
      - name: Docker
        prerequisites:
          - Docker
        content: >
          {
            "command": "docker",
            "args": ["run", "-i", "--rm", "--mount", "type=bind,src={{ALLOWED_DIRECTORY}},dst=/projects", "mcp/filesystem", "/projects"]
          }
    parameters:
      - name: Allowed Directory
        key: ALLOWED_DIRECTORY
        placeholder: /Users/username/Documents
  - id: fireproof
    name: Fireproof
    description: A JSON document store server providing CRUD operations and field-based sorting queries, powered by
      Fireproof database for seamless integration with AI systems.
    author: fireproof-storage
    url: https://github.com/fireproof-storage/mcp-database-server
    category: data
    tags:
      - data
    content:
      - name: Node.js
        content: |
          {
            "command": "node",
            "args": ["{{FIREPROOF_PATH}}/build/index.js"]
          }
      - name: NPM Development
        content: |
          {
            "command": "npm",
            "args": ["start"],
            "cwd": "{{FIREPROOF_PATH}}"
          }
    parameters:
      - name: Fireproof MCP Path
        key: FIREPROOF_PATH
        placeholder: /path/to/fireproof-mcp
        optional: true
  - id: genkit
    name: Genkit Integration
    description: Enables bi-directional integration with Model Context Protocol, allowing applications to both consume MCP
      tools/prompts as a client and expose Genkit tools/prompts as an MCP server.
    author: firebase
    url: https://github.com/firebase/genkit/tree/HEAD/js/plugins/mcp
    category: development
    tags:
      - development
    prerequisites:
      - Node.js 18+
      - Genkit SDK
    content:
      - name: NPM Installation
        prerequisites:
          - Node.js 18+
        content: |
          {
            "command": "npm",
            "args": ["install", "@genkit-ai/mcp"]
          }
      - name: Custom MCP Server Setup
        content: |
          {
            "command": "node",
            "args": ["your-genkit-mcp-server.js"]
          }
    parameters:
      - name: Prerequisites
        key: PREREQUISITES
        placeholder: Requires Node.js 18+ and Genkit SDK installation
  - id: git
    name: Git Tools
    description: Provides Git repository interaction and automation tools for reading, searching, and manipulating Git
      repositories through commands like status, diff, commit, branch management, and more.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers/tree/main/src/git
    category: development
    tags:
      - development
    content:
      - name: UVX
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": ["mcp-server-git", "--repository", "{{REPOSITORY_PATH}}"]
          }
      - name: NPX
        prerequisites:
          - Node.js
        content: >
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/inspector", "uvx", "mcp-server-git", "--repository", "{{REPOSITORY_PATH}}"]
          }
      - name: Python/Pip
        prerequisites:
          - Python
        content: |
          {
            "command": "python",
            "args": ["-m", "mcp_server_git", "--repository", "{{REPOSITORY_PATH}}"]
          }
      - name: Docker
        prerequisites:
          - Docker
        content: |
          {
            "command": "docker",
            "args": ["run", "--rm", "-i", "--mount", "type=bind,src={{REPOSITORY_PATH}},dst=/workspace", "mcp/git"]
          }
    parameters:
      - name: Repository Path
        key: REPOSITORY_PATH
        placeholder: /path/to/git/repo
  - id: ida-pro
    name: IDA Pro
    description: An MCP server for interacting with the IDA Pro disassembler.
    suggest_for:
      filename:
        - "*.idb"
        - "*.i64"
    author: mrexodia
    url: https://github.com/mrexodia/ida-pro-mcp
    category: development
    tags:
      - development
    content:
      - name: UVX
        prerequisites:
          - Python and uv
          - Git
        content: >
          {
            "command": "uvx",
            "args": ["--from", "git+https://github.com/mrexodia/ida-pro-mcp.git@f0af9fba733fb60fc13365b297b10c82db3771d7", "ida-pro-mcp"]
          }
  - id: jupyter
    name: Jupyter AI MCP
    description: Connects Kilo to JupyterLab through the built-in MCP server used by Jupyter AI, an incubating JupyterLab
      project. Provides tools to inspect, create, edit, and execute notebooks and cells in a running local Jupyter
      server.
    suggest_for:
      filename:
        - "*.ipynb"
      vscode_extension:
        - name: Jupyter
          id: ms-toolsai.jupyter
    author: jupyter-ai-contrib
    url: https://github.com/jupyter-ai-contrib/jupyter-server-mcp
    category: data
    tags:
      - data
    prerequisites:
      - Python 3.10 or later
      - Jupyter AI 3.0 or later installed in the same environment as JupyterLab
      - A running local JupyterLab server
    content:
      - name: Local Streamable HTTP
        description: Connects to the MCP endpoint exposed on localhost by a running JupyterLab server with Jupyter AI installed.
        content: |
          {
            "type": "streamable-http",
            "url": "{{JUPYTER_MCP_URL}}"
          }
    parameters:
      - name: Jupyter MCP URL
        key: JUPYTER_MCP_URL
        placeholder: http://127.0.0.1:3001/mcp
  - id: jupyter-mcp
    name: Datalayer Jupyter MCP (Local stdio)
    description: Runs Datalayer's local stdio client to read, edit, and execute Jupyter notebooks and manage kernels; use
      the separate Jupyter AI entry for its built-in HTTP endpoint.
    author: Datalayer
    url: https://github.com/datalayer/jupyter-mcp-server
    category: data
    tags:
      - data
    prerequisites:
      - Python and uv
      - JupyterLab with collaboration support and an authentication token
    content:
      - name: UVX
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": ["jupyter-mcp-server==1.0.2"],
            "env": {
              "JUPYTER_URL": "{{JUPYTER_URL}}",
              "JUPYTER_TOKEN": "{{JUPYTER_TOKEN}}",
              "ALLOW_IMG_OUTPUT": "true"
            }
          }
    parameters:
      - name: Jupyter server URL
        key: JUPYTER_URL
        placeholder: http://localhost:8888
      - name: Jupyter server token
        key: JUPYTER_TOKEN
        placeholder: your_jupyter_token
  - id: laravel-boost
    name: Laravel Boost
    description: Official Laravel MCP server providing comprehensive AI-powered development tools including database schema
      inspection, query execution, route analysis, artisan command access, configuration management, documentation
      search, error tracking, and extensible skills system for Laravel applications.
    author: laravel
    url: https://github.com/laravel/boost
    category: development
    tags:
      - development
    prerequisites:
      - PHP 8.1 or higher
      - Laravel 10.x, 11.x, or 12.x
      - Composer
      - Laravel Boost package installed via composer require laravel/boost --dev
    content:
      - name: PHP Artisan
        prerequisites:
          - PHP 8.1+
          - Laravel 10.x/11.x/12.x
          - Laravel Boost package installed
        content: |
          {
            "command": "php",
            "args": ["artisan", "boost:mcp"]
          }
    parameters: []
  - id: memory
    name: Knowledge Graph Memory
    description: A persistent memory system using a local knowledge graph that enables AI assistants to remember information
      about users across conversations through entities, relations, and observations.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers/tree/main/src/memory
    category: data
    tags:
      - data
    content:
      - name: NPX
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-memory"]
          }
      - name: Docker
        prerequisites:
          - Docker
        content: |
          {
            "command": "docker",
            "args": ["run", "-i", "-v", "claude-memory:/app/dist", "--rm", "mcp/memory"]
          }
      - name: NPX with Custom Memory File
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-memory"],
            "env": {
              "MEMORY_FILE_PATH": "{{MEMORY_FILE_PATH}}"
            }
          }
        parameters:
          - name: Memory File Path
            key: MEMORY_FILE_PATH
            placeholder: /path/to/custom/memory.json
  - id: microsoft-data-api-builder
    name: Microsoft SQL MCP Server
    description: Runs Data API builder's self-hosted SQL MCP server over stdio, exposing only the database entities and
      operations allowed by the supplied DAB configuration and RBAC policy.
    author: Microsoft
    url: https://github.com/Azure/data-api-builder
    category: data
    tags:
      - data
    prerequisites:
      - Docker on an x86-64 host
      - DAB configuration with explicit entities, authentication, and read-only permissions where appropriate
    content:
      - name: Docker (official Data API builder 2.0.8)
        prerequisites:
          - Docker on an x86-64 host
        content: |
          {
            "command": "docker",
            "args": [
              "run",
              "-i",
              "--rm",
              "-v",
              "{{DAB_CONFIG_PATH}}:/App/dab-config.json:ro",
              "mcr.microsoft.com/azure-databases/data-api-builder:2.0.8",
              "--mcp-stdio",
              "--config",
              "/App/dab-config.json"
            ]
          }
    parameters:
      - name: Data API builder config path
        key: DAB_CONFIG_PATH
        placeholder: /absolute/path/to/dab-config.json
  - id: nteract
    name: nteract MCP
    description: Connects Kilo to nteract, a local-first desktop Jupyter notebook app, so agents can create, edit, execute,
      save, and open interactive notebooks through the nteract daemon.
    author: nteract
    url: https://github.com/nteract/nteract
    category: data
    tags:
      - data
    suggest_for:
      filename:
        - "*.ipynb"
    prerequisites:
      - nteract desktop app installed from https://www.nteract.io/ or the nteract GitHub releases page
      - runt available on PATH, or the full path to the runt executable
    content:
      - name: PATH
        description: Runs nteract's MCP server through the runt CLI from PATH.
        prerequisites:
          - runt is available on PATH
        content: |
          {
            "command": "runt",
            "args": ["mcp"],
            "env": {
              "NTERACT_CHANNEL": "stable"
            },
            "enabled": true,
            "timeout": 30000
          }
      - name: Absolute Path
        description: Runs nteract's MCP server through an absolute runt executable path for shells where PATH is not inherited
          by Kilo.
        prerequisites:
          - You know the full path to the runt executable
        content: |
          {
            "command": "{{RUNT_PATH}}",
            "args": ["mcp"],
            "env": {
              "NTERACT_CHANNEL": "stable"
            },
            "enabled": true,
            "timeout": 30000
          }
    parameters:
      - name: runt absolute path
        key: RUNT_PATH
        placeholder: /absolute/path/to/runt or C:\path\to\runt.exe
  - id: oracle-sqlcl-mcp
    name: Oracle SQLcl MCP Server
    description: Uses saved SQLcl connections to inspect schemas and run SQL, PL/SQL, and SQLcl operations against Oracle
      Database, starting at SQLcl's most restrictive command level and relying on database-role permissions for data
      access.
    author: Oracle
    url: https://docs.oracle.com/en/database/oracle/sql-developer-command-line/26.1/sqcug/using-oracle-sqlcl-mcp-server.html
    category: data
    tags:
      - data
    prerequisites:
      - Oracle SQLcl 25.3 or newer
      - Saved SQLcl database connection with least-privilege credentials
    content:
      - name: Local SQLcl (restrict level 4)
        prerequisites:
          - Oracle SQLcl
        content: |
          {
            "command": "{{SQLCL_PATH}}",
            "args": [
              "-R",
              "4",
              "-mcp"
            ],
            "env": {
              "TNS_ADMIN": "{{TNS_ADMIN}}"
            }
          }
    parameters:
      - name: SQLcl Executable Path
        key: SQLCL_PATH
        placeholder: /opt/sqlcl/bin/sql
      - name: Oracle Network Configuration Directory
        key: TNS_ADMIN
        placeholder: /path/to/network/admin
        optional: true
  - id: playwright
    name: Playwright
    description: Official Microsoft MCP server providing browser automation capabilities using Playwright. Enables LLMs to
      interact with web pages through structured accessibility snapshots, bypassing the need for screenshots or
      visually-tuned models. Supports fast and lightweight automation with deterministic tool application.
    author: microsoft
    url: https://github.com/microsoft/playwright-mcp
    category: web-automation
    tags:
      - web-automation
    content:
      - name: NPX
        prerequisites:
          - Node.js 18+
        content: |
          {
            "command": "npx",
            "args": ["-y", "@playwright/mcp@0.0.38"]
          }
      - name: Docker
        prerequisites:
          - Docker
        content: >
          {
            "command": "docker",
            "args": ["run", "-i", "--rm", "--init", "--pull=always", "mcr.microsoft.com/playwright/mcp@sha256:48cfafeaaf213c618fff8d2e311f33b170dd1eab87a351260cdb9c24a785fc50"]
          }
      - name: NPX with Chrome Extension
        prerequisites:
          - Node.js 18+
          - Chrome browser
        content: |
          {
            "command": "npx",
            "args": ["-y", "@playwright/mcp@0.0.38", "--port={{PORT}}", "--extension"]
          }
        parameters:
          - name: Port
            key: PORT
            placeholder: "4242"
            optional: true
      - name: NPX with Storage State
        prerequisites:
          - Node.js 18+
        content: |
          {
            "command": "npx",
            "args": ["-y", "@playwright/mcp@0.0.38", "--isolated", "--storage-state={{STORAGE_STATE_PATH}}"]
          }
        parameters:
          - name: Storage State Path
            key: STORAGE_STATE_PATH
            placeholder: /path/to/storage.json
  - id: postgres
    name: PostgreSQL Reader
    description: Provides read-only access to PostgreSQL databases, allowing LLMs to inspect database schemas and execute
      read-only queries within protected transactions.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers-archived/tree/main/src/postgres
    category: data
    tags:
