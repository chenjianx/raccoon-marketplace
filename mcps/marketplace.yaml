    parameters:
      - name: PostgreSQL URL
        key: POSTGRESQL_URL
        placeholder: postgresql://user:password@localhost:5432/mydb
  - id: power-bi-modeling
    name: Power BI Modeling MCP (Local)
    description: Connects locally to Power BI Desktop, Fabric semantic models, or PBIP/TMDL projects for metadata
      inspection, DAX validation, and model analysis with write operations disabled.
    author: Microsoft
    url: https://github.com/microsoft/powerbi-modeling-mcp
    category: data
    tags:
      - data
    prerequisites:
      - Node.js 20 or newer
      - Power BI Desktop, Fabric access, or a Power BI project
    content:
