# MCP category usage
#
# 58 MCPs across 7 categories. Each MCP has one primary category.
# This summary is generated by bin/generate-mcps-marketplace.ts; do not edit it manually.
#
# - data: 27
# - development: 14
# - observability: 6
# - productivity: 4
# - web-automation: 3
# - business: 2
# - search: 2
#
items:
  - id: amazon-keyspaces-mcp
    name: Amazon Keyspaces MCP
    description: Queries Amazon Keyspaces or Cassandra catalogs and rows through a local AWS Labs server that only exposes
      read-only SELECT operations.
    author: AWS Labs
    url: https://github.com/awslabs/mcp/tree/main/src/amazon-keyspaces-mcp-server
    category: data
    tags:
      - data
    prerequisites:
      - Python and uv
      - AWS credentials with read-only Keyspaces permissions
    content:
      - name: UVX (official, read-only)
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": ["awslabs.amazon-keyspaces-mcp-server==0.0.14"],
            "env": {
              "AWS_PROFILE": "{{AWS_PROFILE}}",
              "AWS_REGION": "{{AWS_REGION}}",
              "FASTMCP_LOG_LEVEL": "ERROR"
            }
          }
    parameters:
      - name: AWS profile
        key: AWS_PROFILE
        placeholder: default
      - name: AWS region
        key: AWS_REGION
        placeholder: us-east-1
  - id: aws-data-processing
    name: AWS Data Processing MCP
    description: Inspects AWS Glue, EMR, and Athena catalogs, jobs, clusters, and query metadata through the official AWS
      Labs server with writes and sensitive result access disabled.
    author: AWS Labs
    url: https://github.com/awslabs/mcp/tree/main/src/aws-dataprocessing-mcp-server
    category: data
    tags:
      - data
    prerequisites:
      - Python and uv
      - AWS credentials with least-privilege Glue, EMR, and Athena read permissions
    content:
      - name: UVX (official, read-only)
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": ["awslabs.aws-dataprocessing-mcp-server==0.1.31"],
            "env": {
              "AWS_PROFILE": "{{AWS_PROFILE}}",
              "AWS_REGION": "{{AWS_REGION}}",
              "FASTMCP_LOG_LEVEL": "ERROR"
            }
          }
    parameters:
      - name: AWS profile
        key: AWS_PROFILE
        placeholder: default
      - name: AWS region
        key: AWS_REGION
        placeholder: us-east-1
  - id: codegen
    name: Codegen
    description: Enables parsing codebases and executing codemods through standardized model inference, supporting various
      LLM providers via integration with the Codegen SDK.
    author: codegen-sh
    url: https://github.com/codegen-sh/codegen-sdk/tree/develop/codegen-examples/examples/codegen-mcp-server
    category: development
    tags:
      - development
    prerequisites:
      - uv
      - Python 3.12+
    content:
      - name: UVX
        prerequisites:
          - Python and uv
        content: >
          {
            "command": "uvx",
            "args": [
              "--from",
              "git+https://github.com/codegen-sh/codegen-sdk.git#egg=codegen-mcp-server&subdirectory=codegen-examples/examples/codegen-mcp-server",
              "codegen-mcp-server"
            ]
          }
      - name: Direct Execution
        prerequisites:
          - Python
          - uv
        content: >
          {
            "command": "uvx",
            "args": ["--from", "git+https://github.com/codegen-sh/codegen-sdk.git#egg=codegen-mcp-server&subdirectory=codegen-examples/examples/codegen-mcp-server", "codegen-mcp-server"]
          }
    parameters:
      - name: Prerequisites
        key: PREREQUISITES
        placeholder: Requires uv and Python 3.12+
  - id: composer-trade
    name: Composer
    description: Official Composer MCP server that enables creation of automated investing strategies, backtesting, strategy
      discovery, portfolio monitoring, and live trading through the Composer platform.
    author: invest-composer
    url: https://github.com/invest-composer/composer-trade-mcp
    category: business
    tags:
      - business
    content: >
      {
        "command": "uvx",
        "args": ["composer-trade-mcp==0.1.4", "--hash", "sha256:37d8fcfd6ddc9c8155633f755159f3fcb1a63e7acc2a32513613341a851c84e2"],
        "env": {
          "COMPOSER_API_KEY": "{{COMPOSER_API_KEY}}",
          "COMPOSER_SECRET_KEY": "{{COMPOSER_SECRET_KEY}}"
        }
      }
    parameters:
      - name: Composer API Key
        key: COMPOSER_API_KEY
        placeholder: your_composer_api_key
        optional: true
      - name: Composer Secret Key
        key: COMPOSER_SECRET_KEY
        placeholder: your_composer_secret_key
        optional: true
    prerequisites:
      - Python and uv
      - Composer.trade account (optional for backtesting)
      - Composer.trade subscription (required for live trading)
  - id: confluent
    name: Confluent MCP Server
    description: Connects to Confluent Cloud, Confluent Platform, or Kafka for read-focused topic, schema, connector, Flink,
      metrics, and documentation inspection from a user-supplied config.
    author: Confluent
    url: https://github.com/confluentinc/mcp-confluent
    category: data
    tags:
      - data
    prerequisites:
      - Node.js 22+
      - Confluent MCP YAML configuration containing least-privilege credentials
    content:
      - name: NPX (official, read-focused allowlist)
        prerequisites:
          - Node.js 22+
        content: >
          {
            "command": "npx",
            "args": [
              "-y",
              "@confluentinc/mcp-confluent@1.4.0",
              "--config",
              "{{CONFLUENT_CONFIG_PATH}}",
              "--allow-tools",
              "search-product-docs,get-product-doc-page,explain-disabled-tools,list-topics,list-consumer-groups,describe-consumer-group,get-consumer-group-lag,get-topic-config,consume-messages,list-schemas,list-organizations,list-environments,read-environment,list-clusters,list-flink-statements,read-flink-statement,get-flink-statement-exceptions,list-flink-catalogs,list-flink-databases,list-flink-tables,describe-flink-table,get-flink-table-info,check-flink-statement-health,detect-flink-statement-issues,get-flink-statement-profile,list-connectors,get-connector-config,get-connector-offsets,get-connector-status,get-connector-tasks,get-connector-error-summary,get-connector-error-recommendations,get-connector-logs,search-topics-by-tag,search-topics-by-name,list-tags,list-tableflow-topics,read-tableflow-topic,list-tableflow-regions,list-tableflow-catalog-integrations,list-available-metrics,query-metrics,list-billing-costs"
            ],
            "env": {
              "DO_NOT_TRACK": "true"
            }
          }
    parameters:
      - name: Confluent MCP config path
        key: CONFLUENT_CONFIG_PATH
        placeholder: /absolute/path/to/config.yaml
  - id: dbhub
    name: DBHub
    description: Connects to PostgreSQL, MySQL, MariaDB, SQL Server, or SQLite through Bytebase's token-efficient local MCP
      server using a user-supplied TOML guardrail configuration.
    author: Bytebase
    url: https://github.com/bytebase/dbhub
    category: data
    tags:
      - data
    prerequisites:
      - Node.js
      - DBHub TOML config with execute_sql readonly=true and an appropriate max_rows limit
    content:
      - name: NPX with guarded TOML config
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@bytebase/dbhub@0.22.4", "--transport", "stdio", "--config", "{{DBHUB_CONFIG_PATH}}"]
          }
    parameters:
      - name: DBHub TOML config path
        key: DBHUB_CONFIG_PATH
        placeholder: /absolute/path/to/dbhub.toml
  - id: dbt
    name: dbt
    description: A MCP server for interacting with dbt, providing AI agents with context from dbt Core, dbt Fusion, and dbt
      Platform. Supports SQL execution, Semantic Layer queries, project discovery, dbt CLI operations, Admin API
      management, code generation, and column-level lineage tracing.
    author: dbt-labs
    url: https://github.com/dbt-labs/dbt-mcp
    category: data
    tags:
      - data
    prerequisites:
      - Python and uv
    content:
      - name: UVX (dbt Cloud)
        description: Uses OAuth to authenticate with your dbt Cloud account. Provides platform features (Discovery API, Semantic
          Layer, job management) without local CLI commands.
        prerequisites:
          - dbt Cloud account with static subdomain
        content: |
          {
            "command": "uvx",
            "args": ["dbt-mcp"],
            "env": {
              "DBT_HOST": "{{DBT_HOST}}"
            }
          }
      - name: UVX (dbt Cloud + CLI)
        description: Uses OAuth with dbt Cloud and also enables local dbt CLI commands for running, building, and testing dbt
          projects.
        prerequisites:
          - dbt Cloud account with static subdomain
          - dbt CLI installed locally
        content: |
          {
            "command": "uvx",
            "args": ["dbt-mcp"],
            "env": {
              "DBT_HOST": "{{DBT_HOST}}",
              "DBT_PROJECT_DIR": "{{DBT_PROJECT_DIR}}",
              "DBT_PATH": "{{DBT_PATH}}"
            }
          }
        parameters:
          - name: dbt Project Directory
            key: DBT_PROJECT_DIR
            placeholder: /path/to/your/dbt/project
          - name: dbt Executable Path
            key: DBT_PATH
            placeholder: /path/to/your/dbt/executable
      - name: UVX (CLI only)
        description: Runs dbt MCP locally with your dbt project using dbt Core or Fusion CLI. No dbt Cloud account required.
        prerequisites:
          - dbt CLI installed locally
        content: |
          {
            "command": "uvx",
            "args": ["dbt-mcp"],
            "env": {
              "DBT_PROJECT_DIR": "{{DBT_PROJECT_DIR}}",
              "DBT_PATH": "{{DBT_PATH}}"
            }
          }
        parameters:
          - name: dbt Project Directory
            key: DBT_PROJECT_DIR
            placeholder: /path/to/your/dbt/project
          - name: dbt Executable Path
            key: DBT_PATH
            placeholder: /path/to/your/dbt/executable
      - name: Docker
        description: Container-based installation using a dbt Cloud service token for authentication. Provides platform features
          without local dbt installation.
        prerequisites:
          - Docker
          - dbt Cloud account
          - dbt Cloud service token
        content: >
          {
            "command": "docker",
            "args": ["run", "-i", "--rm", "-e", "DBT_HOST", "-e", "DBT_TOKEN", "-e", "DBT_PROD_ENV_ID", "ghcr.io/dbt-labs/dbt-mcp:latest"],
            "env": {
              "DBT_HOST": "{{DBT_HOST}}",
              "DBT_TOKEN": "{{DBT_TOKEN}}",
              "DBT_PROD_ENV_ID": "{{DBT_PROD_ENV_ID}}"
            }
          }
        parameters:
          - name: dbt Production Environment ID
            key: DBT_PROD_ENV_ID
            placeholder: your_production_environment_id
          - name: dbt Service Token
            key: DBT_TOKEN
            placeholder: your_dbt_service_token
    parameters:
      - name: dbt Host
        key: DBT_HOST
        placeholder: cloud.getdbt.com
  - id: elastic-agent-builder-mcp
    name: Elastic Agent Builder MCP
    description: Exposes Elastic Agent Builder tools from an account-specific Kibana endpoint using a least-privilege
      Elastic API key scoped to the intended indices and Kibana space.
    author: Elastic
    url: https://www.elastic.co/docs/explore-analyze/ai-features/agent-builder/mcp-server
    category: observability
    tags:
      - observability
    prerequisites:
      - Elastic deployment with Agent Builder enabled
      - API key with feature_agentBuilder.read and only the required index privileges
    content:
      - name: Kibana remote server
        content: |
          {
            "type": "streamable-http",
            "url": "{{KIBANA_URL}}/api/agent_builder/mcp",
            "headers": {
              "Authorization": "ApiKey {{ELASTIC_API_KEY}}"
            }
          }
    parameters:
      - name: Kibana base URL
        key: KIBANA_URL
        placeholder: https://my-deployment.kb.example.com
      - name: Elastic API key
        key: ELASTIC_API_KEY
        placeholder: your_elastic_api_key
  - id: esignatures
    name: eSignatures
    description: Manages digital contract workflows including creation, sending, and template management for electronic
      signatures through the eSignatures platform.
    author: esignaturescom
    url: https://github.com/esignaturescom/mcp-server-esignatures
    category: business
    tags:
      - business
    content:
      - name: UVX
        prerequisites:
          - Python
          - uv
        content: |
          {
            "command": "uvx",
            "args": ["mcp-server-esignatures"],
            "env": {
              "ESIGNATURES_SECRET_TOKEN": "{{ESIGNATURES_SECRET_TOKEN}}"
            }
          }
      - name: UV Development
        prerequisites:
          - Python
          - uv
        content: |
          {
            "command": "uv",
            "args": [
              "--directory",
              "{{ESIGNATURES_PATH}}",
              "run",
              "mcp-server-esignatures"
            ],
            "env": {
              "ESIGNATURES_SECRET_TOKEN": "{{ESIGNATURES_SECRET_TOKEN}}"
            }
          }
        parameters:
          - name: eSignatures Path
            key: ESIGNATURES_PATH
            placeholder: /path/to/mcp-server-esignatures
            optional: true
    parameters:
      - name: eSignatures Secret Token
        key: ESIGNATURES_SECRET_TOKEN
        placeholder: your_esignatures_api_secret_token
  - id: figma-dev-mode
    name: Figma Dev Mode
    description: Brings Figma directly into your workflow by providing important design information and context to AI agents
      generating code from Figma design files. Enables code generation from selected frames, design context extraction,
      and Code Connect integration.
    author: figma
    url: https://help.figma.com/hc/en-us/articles/32132100833559-Guide-to-the-Dev-Mode-MCP-Server
    category: development
    tags:
      - development
    content:
      - name: Figma Dev Mode
        content: |
          {
            "type": "sse",
            "url": "http://127.0.0.1:3845/sse"
          }
  - id: filesystem
    name: File System
    description: Provides comprehensive filesystem operations including reading, writing, moving files, directory
      management, and advanced file editing with pattern matching and formatting capabilities.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem
    category: development
    tags:
      - development
    content:
      - name: NPX
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-filesystem", "{{ALLOWED_DIRECTORY}}"]
          }
      - name: Docker
        prerequisites:
          - Docker
        content: >
          {
            "command": "docker",
            "args": ["run", "-i", "--rm", "--mount", "type=bind,src={{ALLOWED_DIRECTORY}},dst=/projects", "mcp/filesystem", "/projects"]
          }
    parameters:
      - name: Allowed Directory
        key: ALLOWED_DIRECTORY
        placeholder: /Users/username/Documents
  - id: fireproof
    name: Fireproof
    description: A JSON document store server providing CRUD operations and field-based sorting queries, powered by
      Fireproof database for seamless integration with AI systems.
    author: fireproof-storage
    url: https://github.com/fireproof-storage/mcp-database-server
    category: data
    tags:
      - data
    content:
      - name: Node.js
        content: |
          {
            "command": "node",
            "args": ["{{FIREPROOF_PATH}}/build/index.js"]
          }
      - name: NPM Development
        content: |
          {
            "command": "npm",
            "args": ["start"],
            "cwd": "{{FIREPROOF_PATH}}"
          }
    parameters:
      - name: Fireproof MCP Path
        key: FIREPROOF_PATH
        placeholder: /path/to/fireproof-mcp
        optional: true
  - id: gdrive
    name: Google Drive
    description: Enables searching, listing, and reading files from Google Drive, with automatic export of Google Workspace
      files to common formats like Markdown, CSV, and PNG.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers-archived/tree/main/src/gdrive
    category: search
    tags:
      - search
    prerequisites:
      - Google account with Drive API access
    content:
      - name: NPX
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-gdrive"],
            "env": {
              "GDRIVE_CREDENTIALS_PATH": "{{GDRIVE_CREDENTIALS_PATH}}"
            }
          }
      - name: Docker
        prerequisites:
          - Docker
        content: >
          {
            "command": "docker",
            "args": ["run", "-i", "--rm", "-v", "mcp-gdrive:/gdrive-server", "-e", "GDRIVE_CREDENTIALS_PATH=/gdrive-server/credentials.json", "mcp/gdrive"]
          }
    parameters:
      - name: Google Drive Credentials Path
        key: GDRIVE_CREDENTIALS_PATH
        placeholder: /path/to/.gdrive-server-credentials.json
  - id: genkit
    name: Genkit Integration
    description: Enables bi-directional integration with Model Context Protocol, allowing applications to both consume MCP
      tools/prompts as a client and expose Genkit tools/prompts as an MCP server.
    author: firebase
    url: https://github.com/firebase/genkit/tree/HEAD/js/plugins/mcp
    category: development
    tags:
      - development
    prerequisites:
      - Node.js 18+
      - Genkit SDK
    content:
      - name: NPM Installation
        prerequisites:
          - Node.js 18+
        content: |
          {
            "command": "npm",
            "args": ["install", "@genkit-ai/mcp"]
          }
      - name: Custom MCP Server Setup
        content: |
          {
            "command": "node",
            "args": ["your-genkit-mcp-server.js"]
          }
    parameters:
      - name: Prerequisites
        key: PREREQUISITES
        placeholder: Requires Node.js 18+ and Genkit SDK installation
  - id: git
    name: Git Tools
    description: Provides Git repository interaction and automation tools for reading, searching, and manipulating Git
      repositories through commands like status, diff, commit, branch management, and more.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers/tree/main/src/git
    category: development
    tags:
      - development
    content:
      - name: UVX
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": ["mcp-server-git", "--repository", "{{REPOSITORY_PATH}}"]
          }
      - name: NPX
        prerequisites:
          - Node.js
        content: >
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/inspector", "uvx", "mcp-server-git", "--repository", "{{REPOSITORY_PATH}}"]
          }
      - name: Python/Pip
        prerequisites:
          - Python
        content: |
          {
            "command": "python",
            "args": ["-m", "mcp_server_git", "--repository", "{{REPOSITORY_PATH}}"]
          }
      - name: Docker
        prerequisites:
          - Docker
        content: |
          {
            "command": "docker",
            "args": ["run", "--rm", "-i", "--mount", "type=bind,src={{REPOSITORY_PATH}},dst=/workspace", "mcp/git"]
          }
    parameters:
      - name: Repository Path
        key: REPOSITORY_PATH
        placeholder: /path/to/git/repo
  - id: google-maps-platform-code-assist
    name: Google Maps Platform Code Assist
    description: Official Google Maps Platform MCP for AI-powered code assistance. Provides tools to generate client-side
      and server-side code for Maps, Routes, and Places APIs, helping developers build geospatial applications faster.
    author: googlemaps
    url: https://github.com/googlemaps/platform-ai
    category: development
    tags:
      - development
    content:
      - name: NPX
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@googlemaps/code-assist-mcp@0.2.0"]
          }
  - id: ida-pro
    name: IDA Pro
    description: An MCP server for interacting with the IDA Pro disassembler.
    suggest_for:
      filename:
        - "*.idb"
        - "*.i64"
    author: mrexodia
    url: https://github.com/mrexodia/ida-pro-mcp
    category: development
    tags:
      - development
    content:
      - name: UVX
        prerequisites:
          - Python and uv
          - Git
        content: >
          {
            "command": "uvx",
            "args": ["--from", "git+https://github.com/mrexodia/ida-pro-mcp.git@f0af9fba733fb60fc13365b297b10c82db3771d7", "ida-pro-mcp"]
          }
  - id: jupyter
    name: Jupyter AI MCP
    description: Connects Kilo to JupyterLab through the built-in MCP server used by Jupyter AI, an incubating JupyterLab
      project. Provides tools to inspect, create, edit, and execute notebooks and cells in a running local Jupyter
      server.
    suggest_for:
      filename:
        - "*.ipynb"
      vscode_extension:
        - name: Jupyter
          id: ms-toolsai.jupyter
    author: jupyter-ai-contrib
    url: https://github.com/jupyter-ai-contrib/jupyter-server-mcp
    category: data
    tags:
      - data
    prerequisites:
      - Python 3.10 or later
      - Jupyter AI 3.0 or later installed in the same environment as JupyterLab
      - A running local JupyterLab server
    content:
      - name: Local Streamable HTTP
        description: Connects to the MCP endpoint exposed on localhost by a running JupyterLab server with Jupyter AI installed.
        content: |
          {
            "type": "streamable-http",
            "url": "{{JUPYTER_MCP_URL}}"
          }
    parameters:
      - name: Jupyter MCP URL
        key: JUPYTER_MCP_URL
        placeholder: http://127.0.0.1:3001/mcp
  - id: jupyter-mcp
    name: Datalayer Jupyter MCP (Local stdio)
    description: Runs Datalayer's local stdio client to read, edit, and execute Jupyter notebooks and manage kernels; use
      the separate Jupyter AI entry for its built-in HTTP endpoint.
    author: Datalayer
    url: https://github.com/datalayer/jupyter-mcp-server
    category: data
    tags:
      - data
    prerequisites:
      - Python and uv
      - JupyterLab with collaboration support and an authentication token
