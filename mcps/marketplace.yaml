  - id: amazon-keyspaces-mcp
    name: Amazon Keyspaces MCP
    description: Queries Amazon Keyspaces or Cassandra catalogs and rows through a local AWS Labs server that only exposes
      read-only SELECT operations.
    author: AWS Labs
    url: https://github.com/awslabs/mcp/tree/main/src/amazon-keyspaces-mcp-server
    category: data
    tags:
      - data
    prerequisites:
      - Python and uv
      - AWS credentials with read-only Keyspaces permissions
    content:
      - name: UVX (official, read-only)
        prerequisites:
          - Python and uv
        content: |
          {
            "command": "uvx",
            "args": ["awslabs.amazon-keyspaces-mcp-server==0.0.14"],
            "env": {
              "AWS_PROFILE": "{{AWS_PROFILE}}",
              "AWS_REGION": "{{AWS_REGION}}",
              "FASTMCP_LOG_LEVEL": "ERROR"
            }
          }
    parameters:
      - name: AWS profile
        key: AWS_PROFILE
        placeholder: default
      - name: AWS region
        key: AWS_REGION
        placeholder: us-east-1
  - id: apify
    name: Apify Actors
    description: Enables AI assistants to interact with Apify's web scraping and automation actors, providing access to
      tools for data extraction, web searching, social media analysis, and more.
    author: apify
    url: https://github.com/apify/actors-mcp-server
    category: web-automation
    tags:
      - web-automation
    content:
      - name: NPX
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@apify/actors-mcp-server"],
            "env": {
              "APIFY_TOKEN": "{{APIFY_TOKEN}}"
            }
          }
      - name: NPX with Specific Actors
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@apify/actors-mcp-server", "--actors", "{{ACTOR_LIST}}"],
            "env": {
              "APIFY_TOKEN": "{{APIFY_TOKEN}}"
            }
          }
        parameters:
          - name: Actor List
            key: ACTOR_LIST
            placeholder: lukaskrivka/google-maps-with-contact-details,apify/instagram-scraper
      - name: Remote MCP - SSE
        content: |
          {
            "type": "sse",
            "url": "https://actors-mcp-server.apify.actor/sse",
            "env": {
              "APIFY_TOKEN": "{{APIFY_TOKEN}}"
            }
          }
    parameters:
      - name: Apify API Token
        key: APIFY_TOKEN
        placeholder: your_apify_api_token
