id: gitlab
name: GitLab
description: Enables comprehensive GitLab project management including file operations, issue tracking, merge requests,
  and repository management through the GitLab API.
author: zereight
url: https://github.com/zereight/gitlab-mcp
category: development
prerequisites:
  - GitLab account
content:
  - name: NPX
    prerequisites:
      - Node.js
    content: |
      {
        "command": "npx",
        "args": ["-y", "@zereight/mcp-gitlab@2.1.29"],
        "env": {
          "GITLAB_PERSONAL_ACCESS_TOKEN": "{{GITLAB_PERSONAL_ACCESS_TOKEN}}",
          "GITLAB_API_URL": "{{GITLAB_API_URL}}"
        }
      }
  - name: Global NPM
    prerequisites:
      - Node.js
      - npm install -g @zereight/mcp-gitlab
    content: |
      {
        "command": "zereight-mcp-gitlab",
        "args": [],
        "env": {
          "GITLAB_PERSONAL_ACCESS_TOKEN": "{{GITLAB_PERSONAL_ACCESS_TOKEN}}",
          "GITLAB_API_URL": "{{GITLAB_API_URL}}"
        }
      }
  - name: Docker
    prerequisites:
      - Docker
    content: |
      {
        "command": "docker",
        "args": [
          "run",
          "-i",
          "--rm",
          "-e",
          "GITLAB_PERSONAL_ACCESS_TOKEN",
          "-e",
          "GITLAB_API_URL",
          "zereight050/gitlab-mcp"
        ],
        "env": {
          "GITLAB_PERSONAL_ACCESS_TOKEN": "{{GITLAB_PERSONAL_ACCESS_TOKEN}}",
          "GITLAB_API_URL": "{{GITLAB_API_URL}}"
        }
      }
parameters:
  - name: GitLab Personal Access Token
    key: GITLAB_PERSONAL_ACCESS_TOKEN
    placeholder: your_gitlab_personal_access_token
  - name: GitLab API URL
    key: GITLAB_API_URL
    placeholder: https://gitlab.com/api/v4
