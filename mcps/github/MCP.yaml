id: github
name: GitHub
description: GitHub's official MCP Server that provides repository, issue, pull-request, action, and code access through
  GitHub APIs.
author: GitHub
url: https://github.com/github/github-mcp-server
category: development
prerequisites:
  - GitHub account
content:
  - name: Docker (official, read-only)
    prerequisites:
      - Docker
      - Fine-grained GitHub token limited to the required repositories and read permissions
    content: |
      {
        "command": "docker",
        "args": [
          "run",
          "-i",
          "--rm",
          "-e",
          "GITHUB_PERSONAL_ACCESS_TOKEN",
          "-e",
          "GITHUB_READ_ONLY",
          "ghcr.io/github/github-mcp-server@sha256:2afb26356481d1a350e14544a6e160f7f7ec1561a1ea309b823665abf0309036",
          "stdio"
        ],
        "env": {
          "GITHUB_PERSONAL_ACCESS_TOKEN": "{{GITHUB_PERSONAL_ACCESS_TOKEN}}",
          "GITHUB_READ_ONLY": "1"
        }
      }
parameters:
  - name: GitHub Personal Access Token
    key: GITHUB_PERSONAL_ACCESS_TOKEN
    placeholder: github_pat_your_fine_grained_token or ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
